
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No More Pig</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#F5F5F5;--bg2:#FFFFFF;--bg3:#EBEBEB;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --text:#111111;--text2:rgba(0,0,0,0.5);--text3:rgba(0,0,0,0.28);
  --a:#111111;--a2:#333333;--adim:rgba(0,0,0,0.06);
  --r:#CC2200;--rdim:rgba(204,34,0,0.1);
  --mono:'DM Mono',monospace;--serif:'Instrument Serif',serif;--sans:'Pretendard',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;font-size:14px;}
.app{max-width:480px;margin:0 auto;padding-bottom:110px;}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px;}
.spin{width:28px;height:28px;border:2px solid var(--border2);border-top-color:#111111;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* USER SELECT */
.user-select{padding:0;min-height:100vh;display:flex;flex-direction:column;}
.us-hero{flex:1;display:flex;align-items:center;justify-content:center;background:transparent;padding:40px 20px 30px;}
.us-hero img{width:220px;height:280px;object-fit:contain;border-radius:32px;filter:drop-shadow(0 20px 40px rgba(0,0,0,0.2));}
.us-bottom{padding:28px 24px 40px;text-align:center;}
.us-title{font-family:var(--sans);font-size:38px;font-weight:700;line-height:1.1;margin-bottom:8px;text-align:center;color:var(--text);}
.us-sub{font-size:14px;color:var(--text2);margin-bottom:28px;line-height:1.65;text-align:center;}
.us-cards{display:flex;flex-direction:column;gap:10px;}
.us-card{background:#FFFFFF;border:1px solid rgba(0,0,0,0.1);border-radius:16px;padding:16px 20px;cursor:pointer;transition:border-color .2s,background .2s;display:flex;align-items:center;gap:16px;text-align:left;}
.us-card:hover{border-color:rgba(0,0,0,0.3);background:#F5F5F5;}
.us-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.us-av-a{background:rgba(0,0,0,0.08);}
.us-av-b{background:rgba(0,0,0,0.05);}
.us-info{}
.us-name{font-size:15px;font-weight:500;margin-bottom:3px;font-family:var(--sans);color:var(--text);}
.us-detail{font-size:12px;color:var(--text2);font-family:var(--sans);}

/* HEADER */
.header{padding:20px 20px 14px;border-bottom:none;background:var(--bg);position:sticky;top:0;z-index:100;}
.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.app-name{font-family:var(--mono);font-size:12px;color:var(--text3);letter-spacing:.16em;text-transform:uppercase;}
.header-btns{display:flex;gap:8px;}
.hbtn{background:none;border:1px solid var(--border2);border-radius:8px;padding:5px 11px;color:var(--text2);font-size:12px;cursor:pointer;font-family:var(--mono);transition:border-color .2s,color .2s;}
.hbtn:hover{border-color:var(--a);color:var(--a);}
.hbtn.danger:hover{border-color:var(--r);color:var(--r);}
.header-main{display:flex;align-items:flex-end;justify-content:space-between;}
.wbadge{display:inline-flex;align-items:center;gap:3px;font-family:var(--mono);font-size:12px;padding:3px 8px;border-radius:20px;margin-bottom:5px;}
.bd{background:var(--adim);color:var(--a);}
.bu{background:var(--rdim);color:var(--r);}
.wnum{font-family:var(--sans);font-size:52px;line-height:1;color:var(--text);font-weight:300;letter-spacing:-0.02em;}
.wkg{font-size:18px;color:var(--text2);font-family:var(--sans);font-weight:300;}
.hright{text-align:right;}
.tlabel{font-size:12px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;}
.tnum{font-family:var(--sans);font-size:20px;color:#111111;font-weight:400;}
.tremain{font-size:12px;color:var(--text3);margin-top:2px;font-family:var(--sans);}
.prog-strip{height:6px;background:var(--bg3);margin-top:12px;border-radius:999px;overflow:hidden;}
.prog-fill{height:100%;background:#191919;border-radius:999px;transition:width .7s cubic-bezier(.4,0,.2,1);}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:24px 22px;width:100%;max-width:380px;margin:auto;animation:slideUp .22s ease;}
@keyframes slideUp{from{transform:translateY(14px);opacity:0;}to{transform:none;opacity:1;}}
.modal-title{font-size:15px;font-weight:500;margin-bottom:16px;}
.field{margin-bottom:12px;}
.fl{font-size:12px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;display:block;}
.fw{position:relative;}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:10px 38px 10px 13px;color:var(--text);font-family:var(--mono);font-size:18px;outline:none;transition:border-color .2s;-moz-appearance:textfield;}
.fi::-webkit-outer-spin-button,.fi::-webkit-inner-spin-button{-webkit-appearance:none;}
.fi:focus{border-color:var(--a);}
.fu{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3);}
.ft{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:10px 13px;color:var(--text);font-size:13px;outline:none;font-family:var(--sans);}
.ft::placeholder{color:var(--text3);}
.ft:focus{border-color:var(--a);}
.fe{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:10px 13px;color:var(--text);font-size:20px;outline:none;font-family:var(--sans);}
.fe::placeholder{color:var(--text3);}
.modal-btns{display:flex;gap:10px;margin-top:20px;}
.btn-c{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px;color:var(--text2);cursor:pointer;font-size:14px;font-family:var(--sans);}
.btn-s{flex:2;background:#111111;border:none;border-radius:10px;padding:11px;color:#FFFFFF;font-weight:600;cursor:pointer;font-size:14px;font-family:var(--sans);transition:background .15s;}
.btn-s:hover{background:#333333;}
.msec{font-size:12px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.12em;margin:16px 0 9px;}

/* SECTION */
.section{padding:18px 20px 0;}
.slabel{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;font-family:var(--sans);font-weight:500;}

/* ENTRY */
.entry-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;}
.edate-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;}
.edate{font-size:13px;color:var(--text2);font-family:var(--sans);}
.estatus{font-family:var(--sans);font-size:12px;color:var(--text3);}
.einput-row{display:flex;gap:10px;align-items:center;}
.ewrap{position:relative;flex:1;}
.einput{width:100%;background:#FFFFFF;border:1px solid rgba(0,0,0,0.12);border-radius:10px;padding:0 42px 0 15px;height:54px;color:var(--text);font-family:var(--sans);font-size:22px;font-weight:300;outline:none;transition:border-color .2s;-moz-appearance:textfield;}
.einput::-webkit-outer-spin-button,.einput::-webkit-inner-spin-button{-webkit-appearance:none;}
.einput:focus{border-color:var(--a);}
.eunit{position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3);}
.ebtn{background:#111111;color:#FFFFFF;border:none;border-radius:10px;padding:0 18px;height:54px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:background .15s,transform .1s;white-space:nowrap;}
.ebtn:hover{background:#333333;}
.ebtn:active{transform:scale(.97);}
.enote{width:100%;margin-top:9px;background:#FFFFFF;border:1px solid rgba(0,0,0,0.1);border-radius:8px;padding:8px 13px;color:var(--text2);font-size:13px;outline:none;font-family:var(--sans);resize:none;}
.enote::placeholder{color:var(--text3);}
.esaved{display:flex;align-items:center;justify-content:space-between;}
.esaved-val{font-family:var(--sans);font-size:26px;color:var(--a);font-weight:300;}
.esaved-note{font-size:12px;color:var(--text3);margin-top:3px;}
.eedit{background:none;border:1px solid var(--border2);border-radius:7px;padding:6px 12px;color:var(--text3);font-size:12px;cursor:pointer;font-family:var(--mono);}

/* PENALTY */
.pen-card{border-radius:16px;overflow:hidden;margin-top:13px;}
.pen-card.s{background:var(--bg2);border:1px solid rgba(0,0,0,0.2);}
.pen-card.d{background:#FFFFFF;border:1px solid rgba(204,34,0,0.3);}
.pen-top{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;border-bottom:1px solid var(--border);}
.pen-lbl{font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;}
.pen-lbl.s{color:var(--a);}
.pen-lbl.d{color:var(--r);}
.pen-cd{font-family:var(--mono);font-size:12px;padding:3px 8px;border-radius:20px;}
.pen-cd.s{background:var(--adim);color:var(--a);}
.pen-cd.d{background:var(--rdim);color:var(--r);}
.pen-body{display:flex;align-items:center;gap:13px;padding:13px 15px;}
.pen-img{width:136px;height:176px;border-radius:0px;object-fit:contain;background:#f0ede8;flex-shrink:0;padding:6px;}
.pen-info{}
.pen-name{font-family:var(--mono);font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.pen-item{font-size:14px;color:var(--text);font-weight:500;font-family:var(--sans);}
.pen-origin{font-size:12px;color:var(--text3);margin-top:3px;font-family:var(--sans);}
.pen-roll{display:inline-block;margin-top:5px;font-size:12px;padding:2px 8px;border-radius:10px;font-family:var(--mono);}
.pen-roll.s{background:var(--adim);color:var(--a);}
.pen-roll.d{background:var(--rdim);color:var(--r);}
.pen-foot{padding:0 15px 13px;}
.pen-bar-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);font-family:var(--mono);margin-bottom:5px;}
.pen-bar{height:6px;background:var(--bg3);border-radius:999px;overflow:hidden;}
.pen-bar-fill{height:100%;border-radius:999px;transition:width .7s ease;}
.pen-bar-fill.s{background:#191919;}
.pen-bar-fill.d{background:#191919;}

/* RIVAL CARD */
.rival-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-top:0;}
.rival-header{display:flex;align-items:center;gap:10px;padding:13px 15px;border-bottom:1px solid var(--border);}
.rival-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.rival-name{font-size:13px;font-weight:500;font-family:var(--sans);}
.rival-updated{font-size:12px;color:var(--text3);font-family:var(--mono);margin-left:auto;}
.rival-body{padding:13px 15px;}
.rival-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.rival-row:last-child{margin-bottom:0;}
.rival-lbl{font-size:12px;color:var(--text2);font-family:var(--sans);}
.rival-val{font-family:var(--sans);font-size:14px;color:var(--text);font-weight:500;}
.rival-val.good{color:var(--a);}
.rival-val.bad{color:var(--r);}
.rival-prog{margin-top:10px;}
.rival-prog-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:5px;}
.rival-prog-fill{height:100%;border-radius:2px;}
.rival-prog-fill.s{background:var(--a);}
.rival-prog-fill.d{background:var(--r);}

/* HIST */
.hist-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.hist-item:last-child{border-bottom:none;}
.hdot{width:7px;height:7px;border-radius:50%;background:var(--border2);flex-shrink:0;}
.hdot.hi{background:var(--a);}
.hdate{font-size:13px;color:var(--text2);font-family:var(--sans);}
.hnote{font-size:12px;color:var(--text3);margin-top:1px;font-family:var(--sans);}
.hw{font-family:var(--sans);font-size:15px;color:var(--text);font-weight:500;}
.hd{font-family:var(--mono);font-size:12px;}
.hd.dn{color:var(--a);}
.hd.up{color:var(--r);}

/* CAL */
.cal-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:13px 15px 10px;}
.cal-nb{background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:4px 8px;}
.cal-month{font-family:var(--mono);font-size:13px;color:var(--text);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:0 9px 13px;gap:3px;}
.cal-dow{font-family:var(--mono);font-size:12px;color:var(--text3);text-align:center;padding:4px 0 7px;}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;transition:background .15s;position:relative;gap:1px;}
.cal-cell:hover{background:var(--bg3);}
.cal-cell.today .cal-d{color:var(--user-color, #111);font-weight:600;}
.cal-cell.rec::after{content:'';position:absolute;bottom:3px;width:3px;height:3px;border-radius:50%;background:var(--user-color, #111);}
.cal-cell.sel{background:var(--adim);outline:1px solid rgba(0,0,0,0.2);}
.cal-cell.mong{background:var(--user-color, #111);border-radius:8px;}
.cal-cell.mong .cal-d{color:#FFFFFF;font-weight:700;}.cal-cell.mong .cal-w{color:rgba(255,255,255,0.8);}
.cal-d{font-size:12px;color:var(--text2);font-family:var(--mono);line-height:1;}
.cal-w{font-size:12px;color:var(--user-color, #111);font-family:var(--mono);}
.cal-cell.other .cal-d{color:var(--text3);}
.day-panel{margin:0 9px 11px;background:var(--bg3);border-radius:10px;padding:13px;display:none;}
.day-panel.show{display:block;animation:fadeIn .2s ease;}
.dp-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;}
.dp-date{font-size:13px;color:var(--text);font-weight:500;}
.dp-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;}
.dp-row{display:flex;gap:8px;align-items:center;}
.dp-wrap{position:relative;flex:1;}
.dp-input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:9px 32px 9px 11px;color:var(--text);font-family:var(--mono);font-size:17px;outline:none;-moz-appearance:textfield;}
.dp-input::-webkit-outer-spin-button,.dp-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.dp-input:focus{border-color:var(--a);}
.dp-unit{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text3);}
.dp-save{background:var(--a);border:none;border-radius:8px;padding:9px 14px;color:#0d0d0f;font-weight:600;cursor:pointer;font-size:13px;font-family:var(--sans);}
.dp-note{width:100%;margin-top:7px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:7px 11px;color:var(--text2);font-size:12px;outline:none;font-family:var(--sans);resize:none;}
.dp-note::placeholder{color:var(--text3);}
.dp-existing{display:flex;justify-content:space-between;align-items:center;}
.dp-ev{font-family:var(--mono);font-size:20px;color:var(--text);}
.dp-del{background:none;border:1px solid var(--border2);border-radius:6px;padding:5px 11px;color:var(--text3);font-size:12px;cursor:pointer;font-family:var(--mono);}
.dp-del:hover{color:var(--r);border-color:var(--r);}

/* GRAPH */
.graph-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:18px;}
canvas#wChart{width:100%!important;height:160px!important;}

/* WEEKS */
.wli{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:9px;}
.wli-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.wli-label{font-family:var(--mono);font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;}
.wli-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;}
.wli-del:hover{color:var(--r);}
.wli-chips{display:flex;gap:7px;flex-wrap:wrap;}
.chip{background:var(--bg3);border-radius:6px;padding:4px 9px;font-size:12px;color:var(--text2);}
.chip.g{color:var(--a);}
.chip.p{color:var(--r);}
.add-week-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--bg2);border:1px dashed var(--border2);border-radius:12px;padding:13px;color:var(--text3);font-size:13px;cursor:pointer;margin-top:13px;transition:border-color .15s,color .15s;font-family:var(--sans);}
.add-week-btn:hover{border-color:var(--a);color:var(--a);}

/* NAV */
.bottom-nav{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  width:calc(100% - 48px);max-width:400px;
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(20px) saturate(1.8);
  -webkit-backdrop-filter:blur(20px) saturate(1.8);
  border:1px solid rgba(255,255,255,0.7);
  border-radius:40px;
  display:flex;padding:10px 0 10px;
  box-shadow:0 8px 32px rgba(0,0,0,0.10),0 1.5px 0 rgba(255,255,255,0.8) inset;
}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px;}
.nav-ico{display:flex;align-items:center;justify-content:center;width:24px;height:24px;}
.nav-lbl{font-size:12px;color:var(--text3);font-family:var(--sans);font-weight:500;transition:color .15s;}
.nav-item.on .nav-lbl{color:#111111;font-weight:600;}
.nav-item.on .nav-ico svg{stroke:#111111;}
.nav-item .nav-ico svg{stroke:#AAAAAA;}
.nav-item.on{background:rgba(0,0,0,0.07);margin:0 4px;border-radius:24px;}

/* COMPARE */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cmp-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;}
.cmp-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.cmp-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;}
.cmp-n{font-size:13px;font-weight:500;}
.cmp-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.cmp-lbl{font-size:12px;color:var(--text3);}
.cmp-val{font-family:var(--mono);font-size:13px;color:var(--text);}
.cmp-val.g{color:var(--a);}
.cmp-val.r{color:var(--r);}

/* PROFILE */
.prof-page{padding:0 0 20px;}
.prof-hero{position:relative;background:var(--bg2);border-bottom:1px solid var(--border);padding:28px 20px 22px;text-align:left;}
.prof-photo-wrap{position:relative;display:inline-block;margin-bottom:12px;}
.prof-photo{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--border2);display:block;}
.prof-photo-placeholder{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;border:2px dashed var(--border2);}
.prof-photo-placeholder.A{background:var(--adim);}
.prof-photo-placeholder.B{background:var(--rdim);}
.prof-upload-btn{position:absolute;bottom:0;right:0;width:28px;height:28px;border-radius:50%;background:#FFFFFF;border:1.5px solid rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:#555555;font-weight:400;line-height:1;}
.prof-upload-btn:hover{background:#F0F0F0;}
#photoInput{display:none;}
.prof-name{font-size:22px;font-weight:500;margin-bottom:3px;font-family:var(--sans);text-align:left;}
.prof-sub{font-size:13px;color:var(--text2);text-align:left;font-family:var(--sans);}
.prof-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);margin-top:0;}
.prof-stat{background:var(--bg);padding:14px 10px;text-align:center;}
.prof-stat-val{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--text);}
.prof-stat-val.g{color:var(--a);}
.prof-stat-val.r{color:var(--r);}
.prof-stat-lbl{font-size:12px;color:var(--text3);margin-top:3px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;}
.prof-section{padding:20px 20px 0;}
.prof-sec-label{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;font-family:var(--mono);}
.prof-info-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.prof-info-row{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border);}
.prof-info-row:last-child{border-bottom:none;}
.prof-info-lbl{font-size:13px;color:var(--text2);}
.prof-info-val{font-family:var(--mono);font-size:13px;color:var(--text);}
.prof-info-val.g{color:var(--a);}
.prof-week-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.prof-week-item:last-child{border-bottom:none;}
.prof-week-date{font-size:12px;color:var(--text2);}
.prof-week-chips{display:flex;gap:6px;align-items:center;margin-top:3px;flex-wrap:wrap;}
.prof-week-chip{font-size:12px;padding:2px 7px;border-radius:8px;font-family:var(--mono);}
.prof-week-chip.ach{background:var(--adim);color:var(--a);}
.prof-week-chip.fail{background:var(--rdim);color:var(--r);}
.prof-week-chip.act{background:var(--bg3);color:var(--text2);}
.prof-week-chip.fut{background:var(--bg3);color:var(--text3);}
.prof-week-goal{font-family:var(--mono);font-size:13px;color:var(--text);}

/* user select photo */
.us-photo{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0;}


/* CHAT */
.chat-wrap{padding:16px 20px;display:flex;flex-direction:column;height:calc(100vh - 160px);}
.chat-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:16px;}
.chat-bubble-wrap{display:flex;flex-direction:column;gap:3px;}
.chat-bubble-wrap.me{align-items:flex-end;}
.chat-bubble-wrap.other{align-items:flex-start;}
.chat-name{font-size:12px;color:var(--text3);font-family:var(--sans);padding:0 4px;}
.chat-bubble{max-width:75%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;font-family:var(--sans);}
.chat-bubble.me{background:#111111;color:#FFFFFF;border-bottom-right-radius:4px;}
.chat-bubble.other{background:#FFFFFF;color:#111111;border:1px solid rgba(0,0,0,0.1);border-bottom-left-radius:4px;}
.chat-time{font-size:12px;color:var(--text3);padding:0 4px;font-family:var(--sans);}
.chat-input-row{display:flex;gap:8px;align-items:center;padding-top:12px;border-top:1px solid var(--border);}
.chat-input{flex:1;background:#FFFFFF;border:1px solid rgba(0,0,0,0.12);border-radius:22px;padding:10px 16px;font-size:14px;outline:none;font-family:var(--sans);color:var(--text);}
.chat-input::placeholder{color:var(--text3);}
.chat-send{width:40px;height:40px;border-radius:50%;background:#111111;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.chat-send svg{stroke:#FFFFFF;}
.chat-empty{text-align:center;color:var(--text3);font-size:13px;padding:40px 0;font-family:var(--sans);}

@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>
<div id="loading"><div class="spin"></div><div style="font-family:var(--mono);font-size:12px;color:var(--text3)">로딩 중...</div></div>
<div class="app" id="app" style="display:none"></div>

<!-- Profile Edit Modal -->
<div class="modal-bg" id="profModalBg">
  <div class="modal">
    <div class="modal-title">프로필 수정</div>
    <div class="field">
      <label class="fl">별명</label>
      <input type="text" class="ft" id="profName" placeholder="나만의 별명" maxlength="10" style="font-size:16px;padding:11px 14px">
    </div>
    <div class="field">
      <label class="fl">현재 체중</label>
      <div class="fw"><input type="number" class="fi" id="profStartW" placeholder="${USERS[currentUser]?.start||60.0}" step="0.1"><span class="fu">kg</span></div>
    </div>
    <div class="field">
      <label class="fl">최종 목표 체중</label>
      <div class="fw"><input type="number" class="fi" id="profFinalGoal" placeholder="52.6" step="0.1"><span class="fu">kg</span></div>
    </div>
    <div style="background:var(--bg3);border-radius:10px;padding:12px 14px;margin-bottom:4px">
      <div style="font-size:12px;color:var(--text3);margin-bottom:8px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em">자동 생성 플랜 미리보기</div>
      <div id="planPreview" style="font-size:12px;color:var(--text2);line-height:1.8"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-c" onclick="closeProfModal()">취소</button>
      <button class="btn-s" onclick="saveProfModal()">저장</button>
    </div>
  </div>
</div>

<!-- Penalty Setting Modal -->
<div class="modal-bg" id="penSettingBg">
  <div class="modal">
    <div class="modal-title">벌칙 상품 설정</div>
    <div class="field">
      <label class="fl">상품명</label>
      <input type="text" class="ft" id="penName" placeholder="예: Buly 1803 핸드크림" maxlength="40" style="font-size:15px;padding:11px 14px">
    </div>
    <div class="field">
      <label class="fl">카카오 선물하기 링크</label>
      <input type="text" class="ft" id="penLink" placeholder="https://kko.to/..." style="font-size:14px;padding:11px 14px">
    </div>
    <div class="field">
      <label class="fl">상품 이미지 URL (선택)</label>
      <input type="text" class="ft" id="penImgUrl" placeholder="https://..." style="font-size:14px;padding:11px 14px">
    </div>
    <div id="penImgPreview" style="margin-bottom:12px;display:none;">
      <img id="penImgPreviewImg" style="width:100%;max-height:160px;object-fit:contain;border-radius:10px;background:#f5f5f5;padding:8px;">
    </div>
    <div class="modal-btns">
      <button class="btn-c" onclick="closePenSetting()">취소</button>
      <button class="btn-s" onclick="savePenSetting()">저장</button>
    </div>
  </div>
</div>

<!-- Week Modal -->
<div class="modal-bg" id="weekModalBg">
  <div class="modal">
    <div class="modal-title" id="weekModalTitle">주차 추가</div>
    <div class="msec">목표</div>
    <div class="field"><label class="fl">월요일 날짜</label><div class="fw"><input type="date" class="fi" id="wkDate" style="font-size:15px;padding:10px 13px"></div></div>
    <div class="field"><label class="fl">목표 체중</label><div class="fw"><input type="number" class="fi" id="wkGoal" placeholder="57.6" step="0.1"><span class="fu">kg</span></div></div>
    <div class="msec">벌칙</div>
    <div class="field"><label class="fl">벌칙 내용</label><input type="text" class="ft" id="wkPenalty" placeholder="예: Buly 1803 핸드크림 구매"></div>
    <div class="field"><label class="fl">벌칙 아이콘</label><input type="text" class="fe" id="wkEmoji" placeholder="🫙" maxlength="2"></div>
    <div class="modal-btns">
      <button class="btn-c" onclick="closeWeekModal()">취소</button>
      <button class="btn-s" onclick="saveWeek()">저장</button>
    </div>
  </div>
</div>

function pad(n){return String(n).padStart(2,'0');}
function todayKey(){const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function keyToDate(k){const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d);}
function fmtKey(k){const[y,m,d]=k.split('-').map(Number);const days=['일','월','화','수','목','금','토'];return`${m}/${d}(${days[new Date(y,m-1,d).getDay()]})`;}

function S(){return userData[currentUser];}
function saveS(){return storeSave(currentUser, userData[currentUser]);}

function sortedKeys(u){return Object.keys(userData[u]?.records||{}).sort();}
function latestW(u){const ks=sortedKeys(u);return ks.length?userData[u].records[ks[ks.length-1]].w:null;}

function currentWeek(u){
  const ud=userData[u]; if(!ud) return null;
  const now=new Date();
  // After Monday 2PM, show next week's goal
  const isMonday=now.getDay()===1;
  const isPastCutoff=isMonday&&now.getHours()>=14;
  const sorted=[...ud.weeks].sort((a,b)=>a.date.localeCompare(b.date));
  let best=null;
  for(let i=0;i<sorted.length;i++){
    const w=sorted[i];
    const d=keyToDate(w.date);
    d.setHours(0,0,0,0);
    const today=new Date();today.setHours(0,0,0,0);
    if(d<=today){
      // If today is Monday past 2PM, use next week's goal
      if(isPastCutoff&&d.getTime()===today.getTime()){
        best=sorted[i+1]||w;
      } else {
        best=w;
      }
    }
  }
  return best;
}

function weekStatus(w, u){
  const now=new Date();now.setHours(0,0,0,0);
  const monDate=keyToDate(w.date);monDate.setHours(0,0,0,0);
  const daysLeft=Math.ceil((monDate-now)/86400000);
  if(monDate>now) return 'future';
  if(daysLeft===0||daysLeft>-1){const lw=latestW(u);if(lw!==null&&lw<=w.goal)return 'achieved';return 'active';}
  const ud=userData[u]; if(!ud) return 'failed';
  const deadline=new Date(monDate);deadline.setDate(deadline.getDate()+1);
  const weekEnd=`${deadline.getFullYear()}-${pad(deadline.getMonth()+1)}-${pad(deadline.getDate())}`;
  const ks=sortedKeys(u).filter(k=>k>=w.date&&k<weekEnd);
  const bestW=ks.length?Math.min(...ks.map(k=>ud.records[k].w)):null;
  if(bestW!==null&&bestW<=w.goal)return 'achieved';
  return 'failed';
}

function activePenaltyInfo(u){
  const ud=userData[u]; if(!ud||!ud.weeks.length) return null;
  const sorted=[...ud.weeks].sort((a,b)=>a.date.localeCompare(b.date));
  const now=new Date();now.setHours(0,0,0,0);
  let cwIdx=-1;
  for(let i=0;i<sorted.length;i++){const d=keyToDate(sorted[i].date);d.setHours(0,0,0,0);if(d<=now)cwIdx=i;}
  if(cwIdx===-1) return{week:sorted[0],originWeek:sorted[0],rollCount:0,status:'future'};
  const cw=sorted[cwIdx];
  const cwStatus=weekStatus(cw,u);
  let chainStart=cwIdx;
  for(let i=cwIdx-1;i>=0;i--){if(weekStatus(sorted[i],u)==='achieved')chainStart=i;else break;}
  return{week:cw,originWeek:sorted[chainStart],rollCount:cwIdx-chainStart,status:cwStatus};
}

function nextMonday(){
  const d=new Date();const day=d.getDay();
  const diff=day===1?7:(8-day)%7||7;
  d.setDate(d.getDate()+diff);
  return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

// ── STORAGE ──
async function storeSave(uid, data){
  try{localStorage.setItem(`diet_user_${uid}`, JSON.stringify(data));}
  catch(e){console.error('save error',e);}
}
async function storeLoad(uid){
  try{const r=localStorage.getItem(`diet_user_${uid}`);return r?JSON.parse(r):null;}
  catch(e){return null;}
}

async function initStorage(){
  const [a,b]=await Promise.all([storeLoad('A'),storeLoad('B')]);
  userData.A=a;
  userData.B=b;
}

function defaultData(uid){
  const u=USERS[uid];

    startWeight:u.start,

  };
}

}

function updatePlanPreview(){
  const startW=parseFloat(document.getElementById('profStartW').value);
  const fg=parseFloat(document.getElementById('profFinalGoal').value);
  const el=document.getElementById('planPreview');
  if(!startW||!fg||fg>=startW){el.innerHTML='<span style="color:var(--r)">시작 체중이 목표보다 커야 해요</span>';return;}
  const firstLoss=Math.min(3,startW-fg);
  let w=startW, lines=[];
  let d=new Date('2026-04-20');
  for(let i=0;i<20;i++){
    const dateStr=`${d.getMonth()+1}/${d.getDate()}`;
    const loss=i===0?firstLoss:Math.min(0.5,parseFloat((w-fg).toFixed(1)));
    if(loss<=0){lines.push(`${dateStr}: ${fg.toFixed(1)}kg (유지)`);d.setDate(d.getDate()+7);if(lines.filter(l=>l.includes('유지')).length>=2)break;continue;}
    w=parseFloat((w-loss).toFixed(1));
    const reached=w<=fg;
    if(reached)w=fg;
    lines.push(`${dateStr}: ${w.toFixed(1)}kg (-${loss.toFixed(1)}kg)${reached?' 🎯':''}`);
    d.setDate(d.getDate()+7);
    if(reached){lines.push(`이후: ${fg.toFixed(1)}kg 유지`);break;}
  }
  el.innerHTML=lines.join('<br>');
}

async function saveProfModal(){
  const name=document.getElementById('profName').value.trim();
  const startW=parseFloat(document.getElementById('profStartW').value);
  const fg=parseFloat(document.getElementById('profFinalGoal').value);
  if(!name){alert('별명을 입력해주세요.');return;}
  if(!startW||startW<20){alert('현재 체중을 입력해주세요.');return;}
  if(!fg||fg<20||fg>=startW){alert('목표 체중은 현재 체중보다 작아야 해요.');return;}
  S().nickname=name;
  S().finalGoal=fg;
  // Rebuild weeks
  const penalty=S().weeks[0]?.penalty||'Buly 1803 핸드크림 구매';
  const emoji=S().weeks[0]?.emoji||'🫙';
  const firstLoss=Math.min(3,startW-fg);
  const monDates=[];
  // Generate Mondays from 2026-04-20 up to enough weeks
  let d=new Date('2026-04-20');
  for(let i=0;i<20;i++){monDates.push(`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`);d.setDate(d.getDate()+7);}
  const weeks=[];
  let w=startW,reached=false;
  for(let i=0;i<monDates.length;i++){
    if(reached){weeks.push({date:monDates[i],goal:fg,penalty,emoji,maintain:true});if(weeks.filter(x=>x.maintain).length>=4)break;continue;}
    const loss=i===0?firstLoss:Math.min(0.5,parseFloat((w-fg).toFixed(1)));
    w=parseFloat((w-loss).toFixed(1));
    if(w<=fg){w=fg;reached=true;}
    weeks.push({date:monDates[i],goal:w,penalty,emoji,maintain:reached});
  }
  S().weeks=weeks;
  const ks=sortedKeys(currentUser);
  if(ks.length)S().records[ks[0]].w=startW;
  else S().records[todayKey()]={w:startW,note:'시작'};
  S().startWeight=startW;
  await saveS();closeProfModal();render();
}

async function uploadPhoto(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=async(ev)=>{
    // Resize to max 400px to stay under 5MB storage limit
    const img=new Image();
    img.onload=async()=>{
      const max=400;
      let w=img.width,h=img.height;
      if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const dataUrl=canvas.toDataURL('image/jpeg',0.82);
      S().photo=dataUrl;
      await saveS();
      render();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

async function selectUser(uid){

    if(!userData[uid].weeks||userData[uid].weeks.length===0){
      const u=USERS[uid];
      const penalty='Buly 1803 핸드크림 구매';
      const emoji='🫙';
      userData[uid].weeks=u.plan.map(p=>({date:p.date,goal:p.goal,penalty,emoji,maintain:p.maintain||false}));
      await storeSave(uid,userData[uid]);
    }
  }
  render();
}

function penImgHTML(){

function penaltyCardHTML(uid){
  const info=activePenaltyInfo(uid);
  if(!info) return`<button class="add-week-btn" onclick="openWeekModal(null)">+ 월요일 목표 추가</button>`;
  const{week:cw,originWeek,rollCount,status}=info;
  const lw=latestW(uid);
  const now=new Date();now.setHours(0,0,0,0);
  const monDate=keyToDate(cw.date);monDate.setHours(0,0,0,0);
  const daysLeft=Math.ceil((monDate-now)/86400000);
  let state,cdTxt,barPct,footerTxt,statusNote='';
  if(status==='achieved'&&daysLeft>0){
    state='s';cdTxt='✓ 달성 — 다음 주로 연장';barPct=100;
    footerTxt='이번 월요일 목표 달성! 벌칙은 다음 주로';
    if(rollCount>0)statusNote=`<div class="pen-roll s">🔄 ${rollCount}주째 연장 중</div>`;
  }else if(status==='failed'||daysLeft<=0){
    state='d';cdTxt='💸 마감 — 벌칙 발동!';barPct=100;
    footerTxt='벌칙 발동! 새 주차를 설정하세요';
    if(rollCount>0)statusNote=`<div class="pen-roll d">${rollCount}주 버텼지만 발동!</div>`;
  }else{
    state=daysLeft<=2?'d':'s';
    cdTxt=daysLeft===1?'D-1 내일 마감!':`D-${daysLeft}`;
    barPct=Math.min(95,Math.round((7-(daysLeft>0?daysLeft:0))/7*100));
    footerTxt=lw!==null
      ?(cw.maintain?`현재 ${lw.toFixed(1)}kg — ${lw<=cw.goal?'유지 중!':(lw-cw.goal).toFixed(1)+'kg 초과'}`
        :`현재 ${lw.toFixed(1)}kg — ${Math.max(0,lw-cw.goal).toFixed(1)}kg 더 빼면 연장`)
      :'오늘 체중을 기록해주세요';
    if(rollCount>0)statusNote=`<div class="pen-roll s">🔄 ${rollCount}주째 연장 중</div>`;
  }
  const isPenaltyHandcream = originWeek.penalty&&originWeek.penalty.includes('핸드크림');
  const iconHTML=isPenaltyHandcream
    ?penImgHTML()
    :`<div style="width:136px;height:176px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:60px;flex-shrink:0">${originWeek.emoji||'🫙'}</div>`;
  const isRolled=rollCount>0;
  const originNote=isRolled
    ?`<div class="pen-origin">${fmtKey(originWeek.date)} 시작 → ${rollCount}주 연장</div>`
    :`<div class="pen-origin">${fmtKey(cw.date)} 주차 목표 ${cw.goal.toFixed(1)}kg</div>`;
  return`<div class="pen-card ${state}">
    <div class="pen-top">
      <span class="pen-lbl ${state}">벌칙${isRolled?' (연장 중)':''}</span>
      <span class="pen-cd ${state}">${cdTxt}</span>
    </div>
    <div class="pen-body">
      ${iconHTML}
      <div class="pen-info">
        <div class="pen-name">벌칙 내용</div>
        <div class="pen-item">${originWeek.penalty}</div>
        ${originNote}${statusNote}
      </div>
    </div>
    <div class="pen-foot">
      <div class="pen-bar-labels"><span>${footerTxt}</span><span>${barPct}%</span></div>
      <div class="pen-bar"><div class="pen-bar-fill ${state}" style="width:${barPct}%"></div></div>
      ${(()=>{
        const lw=latestW(currentUser);
        const hasRecord = lw!==null;
        const failedGoal = hasRecord && cw && lw>cw.goal && daysLeft<=0;
        if(failedGoal){
          const ps2=getPenSetting();return `<div onclick="window.open('${ps2.link}','_blank')" style="margin-top:12px;background:#FEE500;border-radius:10px;padding:12px 16px;text-align:center;cursor:pointer;font-size:13px;font-weight:700;color:#191919;font-family:var(--sans);">상대방에게 선물하기 🎁</div>`;
        }
        const ps3=getPenSetting();return `<div onclick="window.open('${ps3.link}','_blank')" style="margin-top:12px;background:#FEE500;border-radius:10px;padding:12px 16px;text-align:center;cursor:pointer;font-size:13px;font-weight:700;color:#191919;font-family:var(--sans);">선물 미리보기</div>`;
      })()}
    </div>
  </div>`;
}

// ── VS ──
function vsHTML(){
  const uids=['A','B'];
  const cmpCards=uids.map(uid=>{
    const u=USERS[uid];
    const ud=userData[uid];
    if(!ud) return`<div class="cmp-card"><div class="cmp-head">${avatarHTML(uid,28)}<div class="cmp-n">${u.name}</div></div><div style="color:var(--text3);font-size:12px">기록 없음</div></div>`;
    const lw=latestW(uid);
    const cw=currentWeek(uid);
    const ks=sortedKeys(uid);
    const firstW=ks.length?ud.records[ks[0]].w:null;
    const totalLoss=firstW&&lw!==null?firstW-lw:null;
    const remaining=lw!==null&&cw?lw-cw.goal:null;
    const finalGoal=ud.finalGoal||u.plan[5].goal;
    const toFinal=lw!==null?lw-finalGoal:null;
    const info=activePenaltyInfo(uid);
    const penSt=info?info.status:'none';
    return`<div class="cmp-card">
      <div class="cmp-head">${avatarHTML(uid,28)}<div class="cmp-n">${u.name}</div></div>
      <div class="cmp-row"><span class="cmp-lbl">현재</span><span class="cmp-val">${lw!==null?lw.toFixed(1)+' kg':'--'}</span></div>
      <div class="cmp-row"><span class="cmp-lbl">총 감량</span><span class="cmp-val ${totalLoss&&totalLoss>0?'g':'r'}">${totalLoss!==null?(totalLoss>0?'-'+totalLoss.toFixed(1):'+'+Math.abs(totalLoss).toFixed(1))+' kg':'--'}</span></div>
      <div class="cmp-row"><span class="cmp-lbl">주 목표</span><span class="cmp-val ${remaining!==null&&remaining<=0?'g':''}">${remaining!==null&&remaining<=0?'✓':remaining!==null?remaining.toFixed(1)+'kg':'--'}</span></div>
      <div class="cmp-row"><span class="cmp-lbl">최종까지</span><span class="cmp-val">${toFinal!==null?(toFinal<=0?'✓ 달성!':toFinal.toFixed(1)+' kg'):'--'}</span></div>
      <div class="cmp-row"><span class="cmp-lbl">벌칙</span><span class="cmp-val ${penSt==='achieved'?'g':penSt==='failed'?'r':''}">${penSt==='achieved'?'연장 중':penSt==='failed'?'발동!':penSt==='active'?'진행중':penSt==='future'?'예정':'-'}</span></div>
    </div>`;
  }).join('');
  // head-to-head
  const lwA=latestW('A'),lwB=latestW('B');
  let h2h='';
  if(lwA!==null&&lwB!==null){
    const diff=lwA-lwB;
    const leader=diff<0?USERS['A'].name:diff>0?USERS['B'].name:'동률';
    const gap=Math.abs(diff).toFixed(1);
    h2h=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;margin-bottom:14px">
      <div style="font-size:12px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">현재 순위</div>
      <div style="font-size:20px;font-weight:500;color:var(--text)">${diff===0?'🤝 동률':`${diff<0?USERS['A'].emoji:USERS['B'].emoji} ${leader} 리드`}</div>
      ${diff!==0?`<div style="font-size:13px;color:var(--text2);margin-top:4px">${gap}kg 차이</div>`:''}
    </div>`;
  }
  return`<div class="section">
    <div class="slabel">🆚 비교</div>
    ${h2h}
    <div class="compare-grid">${cmpCards}</div>
  </div>`;
}

// ── CALENDAR ──
function calHTML(){
  const first=new Date(calYear,calMonth,1).getDay();
  const dim=new Date(calYear,calMonth+1,0).getDate();
  const pDim=new Date(calYear,calMonth,0).getDate();
  const mns=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const tk=todayKey();
  const monGoalDates=new Set(S().weeks.map(w=>w.date));
  const makeCell=(d,m,y,isOther)=>{
    const k=`${y}-${pad(m)}-${pad(d)}`;
    const rec=S().records[k];const isT=k===tk;const isSel=selDate===k;const isMon=monGoalDates.has(k);
    let cls=`cal-cell${isOther?' other':''}${isT?' today':''}${rec?' rec':''}${isSel?' sel':''}${isMon?' mong':''}`;
    return`<div class="${cls}" onclick="selectDate('${k}')"><span class="cal-d">${d}</span>${rec?`<span class="cal-w">${rec.w.toFixed(1)}</span>`:''}</div>`;
  };
  let cells='';
  for(let i=first-1;i>=0;i--){const d=pDim-i;const m=calMonth===0?12:calMonth;const y=calMonth===0?calYear-1:calYear;cells+=makeCell(d,m,y,true);}
  for(let d=1;d<=dim;d++) cells+=makeCell(d,calMonth+1,calYear,false);
  const total=Math.ceil((first+dim)/7)*7;
  for(let d=1;d<=total-first-dim;d++){const m=calMonth+2>12?1:calMonth+2;const y=calMonth+2>12?calYear+1:calYear;cells+=makeCell(d,m,y,true);}
  let panel='';
  if(selDate){
    const rec=S().records[selDate];
    const[sy,sm,sd]=selDate.split('-').map(Number);
    const dayN=['일','월','화','수','목','금','토'];
    const dStr=`${sm}월 ${sd}일 (${dayN[new Date(sy,sm-1,sd).getDay()]})`;
    const isPast=new Date(sy,sm-1,sd)<=new Date(new Date().setHours(0,0,0,0));
    const mg=S().weeks.find(w=>w.date===selDate);
    const gNote=mg?`<div style="background:var(--user-color,#111);color:#fff;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;font-weight:600;text-align:center;">⚖️ 몸무게를 측정하는 날이에요!</div><div style="font-size:12px;color:var(--text2);margin-bottom:8px;">목표: ${mg.goal.toFixed(1)}kg · 벌칙: ${mg.penalty}</div>`:'';
    if(rec){
      panel=`<div class="day-panel show"><div class="dp-hdr"><span class="dp-date">${dStr}</span><button class="dp-close" onclick="closePan()">×</button></div>${gNote}<div class="dp-existing"><div><div class="dp-ev">${rec.w.toFixed(1)} kg</div>${rec.note?`<div style="font-size:12px;color:var(--text3)">${rec.note}</div>`:''}</div><button class="dp-del" onclick="delRec('${selDate}')">삭제</button></div></div>`;
    }else if(isPast){
      panel=`<div class="day-panel show"><div class="dp-hdr"><span class="dp-date">${dStr}</span><button class="dp-close" onclick="closePan()">×</button></div>${gNote}<div class="dp-row"><div class="dp-wrap"><input type="number" class="dp-input" id="dpW" placeholder="${USERS[currentUser].start}" step="0.1"><span class="dp-unit">kg</span></div><button class="dp-save" onclick="savePan('${selDate}')">저장</button></div><textarea class="dp-note" id="dpNote" placeholder="메모 (선택)" rows="2"></textarea></div>`;
    }
  }
  return`<div class="section">
    <div class="slabel">달력</div>
    <div class="cal-card">
      <div class="cal-nav"><button class="cal-nb" onclick="calPrev()">‹</button><span class="cal-month">${calYear}년 ${mns[calMonth]}</span><button class="cal-nb" onclick="calNext()">›</button></div>
      ${panel}
      <div class="cal-grid">
        <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div><div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow">토</div>
        ${cells}
      </div>
    </div>
  </div>`;
}

    else if(st==='failed'){chipC='var(--r)';chipBg='var(--rdim)';chipTxt='✗ 미달성 · 발동';}
    else if(st==='active'){const dl=Math.ceil((keyToDate(w.date).setHours(0,0,0,0)-new Date().setHours(0,0,0,0))/86400000);chipC='var(--a)';chipBg='var(--adim)';chipTxt=`진행중 D-${dl}`;}

        </div>

      </div>

  }).join('');
  return`<div class="section">

    <div style="font-size:12px;color:var(--text3);margin-bottom:13px;line-height:1.6">달성 → 벌칙 연장 · 미달성 → 벌칙 발동</div>
    ${listHTML||'<div style="color:var(--text3);font-size:13px;padding:14px 0;text-align:center">주차 목표가 없어요</div>'}

function openWeekModal(idx){
  editingWeekIdx=idx;
  document.getElementById('weekModalTitle').textContent=idx===null?'주차 추가':'주차 수정';
  if(idx!==null){const w=S().weeks[idx];document.getElementById('wkDate').value=w.date;document.getElementById('wkGoal').value=w.goal;document.getElementById('wkPenalty').value=w.penalty;document.getElementById('wkEmoji').value=w.emoji||'🫙';}
  else{document.getElementById('wkDate').value=nextMonday();document.getElementById('wkGoal').value='';document.getElementById('wkPenalty').value='';document.getElementById('wkEmoji').value='🫙';}
  document.getElementById('weekModalBg').classList.add('open');
}
function closeWeekModal(){document.getElementById('weekModalBg').classList.remove('open');}
async function saveWeek(){
  const date=document.getElementById('wkDate').value;
  const goal=parseFloat(document.getElementById('wkGoal').value);
  const penalty=document.getElementById('wkPenalty').value.trim();
  const emoji=(document.getElementById('wkEmoji').value||'🫙').trim();
  if(!date){alert('날짜를 선택해주세요.');return;}
  if(!goal||goal<20){alert('목표 체중을 입력해주세요.');return;}
  if(!penalty){alert('벌칙 내용을 입력해주세요.');return;}
  const entry={date,goal,penalty,emoji};
  if(editingWeekIdx===null)S().weeks.push(entry);else S().weeks[editingWeekIdx]=entry;
  await saveS();closeWeekModal();render();
}
async function deleteWeek(idx){if(!confirm('삭제할까요?'))return;S().weeks.splice(idx,1);await saveS();render();}

  return `<div class="chat-wrap">

function sendChat(){
  const input = document.getElementById('chatInput');
  const text = (input?.value||'').trim();
  if(!text) return;
  const msgs = loadMessages();
  msgs.push({uid:currentUser, text, ts:Date.now()});
  saveMessages(msgs);
  input.value='';
  render();
  // Scroll to bottom
  setTimeout(()=>{
    const el=document.getElementById('chatMessages');
    if(el) el.scrollTop=el.scrollHeight;
  },50);
}

  catch{return null;}
}
function savePenSettingData(data){
  localStorage.setItem('nmp_penalty', JSON.stringify(data));
}
function getPenSetting(){
  return loadPenSetting() || {name:'Buly 1803 핸드크림', link:'https://kko.to/X2Co1MkbLR', imgUrl:''};
}

function openPenSetting(){
  const p = getPenSetting();
  document.getElementById('penName').value = p.name||'';
  document.getElementById('penLink').value = p.link||'';
  document.getElementById('penImgUrl').value = p.imgUrl||'';
  updatePenPreview();
  document.getElementById('penSettingBg').classList.add('open');
}
function closePenSetting(){
  document.getElementById('penSettingBg').classList.remove('open');
}
function updatePenPreview(){
  const url = document.getElementById('penImgUrl').value.trim();
  const preview = document.getElementById('penImgPreview');
  const img = document.getElementById('penImgPreviewImg');
  if(url){preview.style.display='block';img.src=url;}
  else{preview.style.display='none';}
}
function savePenSetting(){
  const name = document.getElementById('penName').value.trim();
  const link = document.getElementById('penLink').value.trim();
  const imgUrl = document.getElementById('penImgUrl').value.trim();
  if(!name){alert('상품명을 입력해주세요.');return;}
  if(!link){alert('카카오 선물하기 링크를 입력해주세요.');return;}
  savePenSettingData({name, link, imgUrl});
  closePenSetting();
  render();
}

// ── INIT ──
async function init(){
  // Auto clear if ?reset=1 in URL
  if(location.search.includes('reset=1')){
    localStorage.clear();
    location.href=location.pathname;
    return;
  }
  // Version check - if plan version mismatch, reset weeks only
  const planVersion='2026-04-17-v2';
  if(localStorage.getItem('nmp_plan_version')!==planVersion){
    localStorage.removeItem('diet_user_A');
    localStorage.removeItem('diet_user_B');
    localStorage.setItem('nmp_plan_version', planVersion);
  }
  await initStorage();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
  // reload rival data periodically (localStorage 기반)
  setInterval(async()=>{
    const rivalUID=currentUser==='A'?'B':'A';
    const d=await storeLoad(rivalUID);
    if(d) userData[rivalUID]=d;
  },5000);
  render();
}
init();
</script>
